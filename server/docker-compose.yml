services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: flexfamily
      POSTGRES_USER: flexfamily
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: ./FlexFamilyCalendar.Api
    depends_on:
      - db
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=flexfamily;Username=flexfamily;Password=${DB_PASSWORD:-changeme}"
      Jwt__Key: "${JWT_KEY:-please-change-this-to-a-long-random-secret-min-32-bytes}"
      Jwt__Issuer: "FlexFamilyCalendar"
      Jwt__Audience: "FlexFamilyCalendar"
      # Erst-Admin beim allerersten Start (nur wenn DB leer). Danach kann er weitere Benutzer anlegen.
      Seed__AdminUsername: "${ADMIN_USER:-}"
      Seed__AdminPassword: "${ADMIN_PASSWORD:-}"
    ports:
      # Fallback während der Umstellung. Nach erfolgreichem HTTPS-Test entfernen und
      # Port 8080 in der VPS-Firewall schließen, damit nur noch Caddy (443) erreichbar ist.
      - "8080:8080"
    restart: unless-stopped

  # Reverse-Proxy: terminiert HTTPS für flexfamily.cloud und leitet intern an die API weiter.
  caddy:
    image: caddy:2
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
