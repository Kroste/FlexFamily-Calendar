services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: flexfamily
      POSTGRES_USER: flexfamily
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    # Production zieht das Image von Docker Hub (per Release-Workflow gepusht).
    # Lokal entwickeln: `docker compose build api` (oder `build:`-Block einkommentieren).
    image: ${DOCKERHUB_USER:-larsoste}/flexfamily-calendar-api:${IMAGE_TAG:-latest}
    # build: ./FlexFamilyCalendar.Api
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      - db
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=flexfamily;Username=flexfamily;Password=${DB_PASSWORD:-changeme}"
      Jwt__Key: "${JWT_KEY:-please-change-this-to-a-long-random-secret-min-32-bytes}"
      Jwt__Issuer: "FlexFamilyCalendar"
      Jwt__Audience: "FlexFamilyCalendar"
      # Erst-Admin beim allerersten Start (nur wenn DB leer). Danach kann er weitere Benutzer anlegen.
      Seed__AdminUsername: "${ADMIN_USER:-}"
      Seed__AdminPassword: "${ADMIN_PASSWORD:-}"
      # SMTP für /api/mail/send-week-plan — leer gelassen = der Endpunkt antwortet
      # mit "SMTP serverseitig nicht konfiguriert". Operator setzt diese in der .env.
      Smtp__Host: "${SMTP_HOST:-}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__From: "${SMTP_FROM:-}"
      Smtp__User: "${SMTP_USER:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__UseSsl: "${SMTP_USE_SSL:-true}"
      # AI-Provider-Schlüssel für /api/ai/complete — pro Provider eigener ENV-Wert,
      # leer = Provider antwortet mit "Schlüssel serverseitig nicht gesetzt".
      Ai__Anthropic__Key: "${AI_ANTHROPIC_KEY:-}"
      Ai__OpenAi__Key: "${AI_OPENAI_KEY:-}"
      Ai__Gemini__Key: "${AI_GEMINI_KEY:-}"
      Ai__Perplexity__Key: "${AI_PERPLEXITY_KEY:-}"
    # Kein öffentliches Port-Mapping mehr: die API ist nur intern über das Docker-Netz
    # erreichbar (Caddy → api:8080). Öffentlich ist ausschließlich Caddy (443).
    restart: unless-stopped

  # Reverse-Proxy: terminiert HTTPS, serviert die WASM-SPA und leitet /api/* + /health an die API.
  # Image wird vom Release-Workflow gebaut und nach Docker Hub gepusht.
  caddy:
    image: ${DOCKERHUB_USER:-larsoste}/flexfamily-calendar-caddy:${IMAGE_TAG:-latest}
    # build:
    #   context: ..
    #   dockerfile: server/Caddy.Dockerfile
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    # Caddyfile ist im Image gebacken (server/Caddy.Dockerfile) — kein Mount mehr nötig.
    # Damit reicht auf dem Server ein Deploy-Ordner mit docker-compose.yml + .env,
    # und Änderungen an der Caddyfile werden via Watchtower/Release automatisch ausgerollt.
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  # Auto-Updater: pollt regelmäßig Docker Hub, ersetzt api/caddy automatisch wenn ein
  # neues Image für den verwendeten Tag (z.B. :latest) verfügbar ist. Nur Container
  # mit dem Label `com.centurylinklabs.watchtower.enable=true` werden beobachtet.
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_INTERVAL:-86400}   # default 24h
      WATCHTOWER_CLEANUP: "true"                                  # alte Images aufräumen
      WATCHTOWER_LABEL_ENABLE: "true"                             # nur markierte Container
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
