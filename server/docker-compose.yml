services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: flexfamily
      POSTGRES_USER: flexfamily
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: ./FlexFamilyCalendar.Api
    depends_on:
      - db
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=flexfamily;Username=flexfamily;Password=${DB_PASSWORD:-changeme}"
      Jwt__Key: "${JWT_KEY:-please-change-this-to-a-long-random-secret-min-32-bytes}"
      Jwt__Issuer: "FlexFamilyCalendar"
      Jwt__Audience: "FlexFamilyCalendar"
      # Erst-Admin beim allerersten Start (nur wenn DB leer). Danach kann er weitere Benutzer anlegen.
      Seed__AdminUsername: "${ADMIN_USER:-}"
      Seed__AdminPassword: "${ADMIN_PASSWORD:-}"
      # SMTP für /api/mail/send-week-plan — leer gelassen = der Endpunkt antwortet
      # mit "SMTP serverseitig nicht konfiguriert". Operator setzt diese in der .env.
      Smtp__Host: "${SMTP_HOST:-}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__From: "${SMTP_FROM:-}"
      Smtp__User: "${SMTP_USER:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__UseSsl: "${SMTP_USE_SSL:-true}"
      # AI-Provider-Schlüssel für /api/ai/complete — pro Provider eigener ENV-Wert,
      # leer = Provider antwortet mit "Schlüssel serverseitig nicht gesetzt".
      Ai__Anthropic__Key: "${AI_ANTHROPIC_KEY:-}"
      Ai__OpenAi__Key: "${AI_OPENAI_KEY:-}"
      Ai__Gemini__Key: "${AI_GEMINI_KEY:-}"
      Ai__Perplexity__Key: "${AI_PERPLEXITY_KEY:-}"
    # Kein öffentliches Port-Mapping mehr: die API ist nur intern über das Docker-Netz
    # erreichbar (Caddy → api:8080). Öffentlich ist ausschließlich Caddy (443).
    restart: unless-stopped

  # Reverse-Proxy: terminiert HTTPS, serviert die WASM-SPA und leitet /api/* + /health an die API.
  # Image wird selbst gebaut (Stufe 1 baut die SPA mit wasm-tools, Stufe 2 = caddy:2 mit SPA in /srv/spa).
  caddy:
    build:
      context: ..
      dockerfile: server/Caddy.Dockerfile
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
