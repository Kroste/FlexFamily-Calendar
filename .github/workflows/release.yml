name: Release

# Auf jedes Tag `vX.Y.Z` (typischerweise via `gh release create vX.Y.Z --generate-notes`).
# Wenn das Release noch nicht existiert, legt softprops/action-gh-release es an.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag für Test-Release (z.B. v0.0.0-test)'
        required: true
        type: string

permissions:
  contents: write   # GH-Release-Assets schreiben

env:
  DOTNET_VERSION: '10.0.x'
  DESKTOP_PROJECT: desktop/FlexFamilyCalendar.Desktop.csproj
  # Aus Tag-Push: github.ref_name = vX.Y.Z. Aus workflow_dispatch: aus den Inputs.
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
  # GH-Actions: ab Juni 2026 Default Node 24 — explizit jetzt schon erzwingen, damit
  # die Deprecation-Warnungen für actions/checkout etc. verschwinden.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────── Precheck: sind die Docker-Hub-Secrets gesetzt? ───────────
  # Job-Level `if:` darf nicht direkt auf `secrets.X` zugreifen — Workaround
  # über einen Precheck-Step, der das Ergebnis als Output exportiert.
  precheck:
    runs-on: ubuntu-latest
    outputs:
      docker_ready: ${{ steps.check.outputs.docker_ready }}
    steps:
      - id: check
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DH_USER" ] && [ -n "$DH_TOKEN" ]; then
            echo "docker_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker_ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKERHUB_USERNAME/DOCKERHUB_TOKEN nicht gesetzt — Docker-Push übersprungen."
          fi

  # ─────────── Desktop: Linux + Windows als self-contained Single-File ───────────
  desktop:
    name: Desktop ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
            archive: tar.gz
          - rid: win-x64
            runner: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        shell: bash
        run: |
          # Tag → SemVer (z.B. v1.2.3 → 1.2.3, v1.2.3-test → 1.2.3-test).
          # AssemblyVersion muss strikt numerisch sein; pre-release-suffix abschneiden.
          VERSION="${RELEASE_TAG#v}"
          NUMERIC="${VERSION%%-*}"
          dotnet publish "$DESKTOP_PROJECT" \
            -c Release -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=embedded \
            -p:Version="$VERSION" \
            -p:AssemblyVersion="${NUMERIC}.0" \
            -p:FileVersion="${NUMERIC}.0" \
            -o publish

      - name: Pack
        shell: bash
        run: |
          name="FlexFamilyCalendar-${RELEASE_TAG}-${{ matrix.rid }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "${name}.zip" "./publish/*"
          else
            tar -C publish -czf "${name}.tar.gz" .
          fi
          ls -lh FlexFamilyCalendar-*

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: FlexFamilyCalendar-${{ env.RELEASE_TAG }}-${{ matrix.rid }}.*

  # ─────────── Linux AppImage ───────────
  appimage:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: APT-Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick libfuse2

      - name: Publish
        run: |
          VERSION="${RELEASE_TAG#v}"
          NUMERIC="${VERSION%%-*}"
          dotnet publish "$DESKTOP_PROJECT" \
            -c Release -r linux-x64 \
            --self-contained true \
            -p:DebugType=embedded \
            -p:Version="$VERSION" \
            -p:AssemblyVersion="${NUMERIC}.0" \
            -p:FileVersion="${NUMERIC}.0" \
            -o publish

      - name: AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r publish/* AppDir/usr/bin/
          chmod +x AppDir/usr/bin/FlexFamilyCalendar.Desktop

          # Icon aus dem vorhandenen .ico (Avalonia-Default) — kann später durch ein
          # branded Icon im Repo ersetzt werden.
          convert "src/Assets/avalonia-logo.ico[0]" -resize 256x256 \
            AppDir/usr/share/icons/hicolor/256x256/apps/flexfamily-calendar.png
          cp AppDir/usr/share/icons/hicolor/256x256/apps/flexfamily-calendar.png AppDir/flexfamily-calendar.png

          cat > AppDir/usr/share/applications/flexfamily-calendar.desktop <<EOF
          [Desktop Entry]
          Name=FlexFamily Calendar
          Comment=Familienplaner für Arbeitszeiten und Aktivitäten
          Exec=FlexFamilyCalendar.Desktop
          Icon=flexfamily-calendar
          Terminal=false
          Type=Application
          Categories=Office;Calendar;
          EOF
          cp AppDir/usr/share/applications/flexfamily-calendar.desktop AppDir/

          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/FlexFamilyCalendar.Desktop" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir \
            "FlexFamilyCalendar-${RELEASE_TAG}-x86_64.AppImage"
          ls -lh FlexFamilyCalendar-*.AppImage

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: FlexFamilyCalendar-${{ env.RELEASE_TAG }}-x86_64.AppImage

  # ─────────── Docker: API ───────────
  docker-api:
    name: Docker Image (API)
    needs: precheck
    if: needs.precheck.outputs.docker_ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          # Repo-Root, damit Directory.Build.props (Nullable/ImplicitUsings/MinVer) im Build ist.
          context: .
          file: server/FlexFamilyCalendar.Api/Dockerfile
          push: true
          build-args: |
            VERSION=${{ env.RELEASE_TAG }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/flexfamily-calendar-api:${{ env.RELEASE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/flexfamily-calendar-api:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.RELEASE_TAG }}

  # ─────────── Docker: Caddy + eingebettete WASM-SPA ───────────
  docker-caddy:
    name: Docker Image (Caddy + SPA)
    needs: precheck
    if: needs.precheck.outputs.docker_ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .                       # Repo-Root: Caddy.Dockerfile braucht src/ + browser/
          file: server/Caddy.Dockerfile
          push: true
          build-args: |
            VERSION=${{ env.RELEASE_TAG }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/flexfamily-calendar-caddy:${{ env.RELEASE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/flexfamily-calendar-caddy:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.RELEASE_TAG }}
