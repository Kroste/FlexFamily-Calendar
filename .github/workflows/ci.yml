name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # MinVer braucht die volle Historie, um Tags zu finden.
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Browser-Head braucht die wasm-tools-Workload; ohne kann `dotnet restore` das
      # Browser-Projekt nicht auflösen (NETSDK1147).
      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      # Ein-Schuss-Test über die gesamte Solution. Der csproj-basierte 2-Step-Ansatz
      # ("Test (Client)" / "Test (Server)") knallte auf dem 10.0.301-Runner mit
      # MSB4181 "VSTestTask returned false" / "The argument …dll is invalid" — offenbar
      # eine Ecke im MTP-Kompat-Modus. Die Solution-Variante ist stabil (lokal wie remote).
      - name: Build & Test (Solution)
        run: dotnet test FlexFamilyCalendar.slnx -c Release --verbosity normal
